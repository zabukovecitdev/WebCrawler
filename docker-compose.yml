# Optional services for local development. The app stack (Postgres, Redis, RabbitMQ, MinIO) is assumed
# to be running separately unless you extend this file.
#
# Headless Chrome with CDP for Playwright (JsRenderService):
#   ChromeRendering:Enabled=true
#   ChromeRendering:CdpEndpoint=http://localhost:9222
#
# After starting, run once on the host: npx playwright install chromium
# (Playwright uses its own browser binaries when not using system Chrome.)

services:
  chrome-cdp:
    image: zenika/alpine-chrome:3.0
    command:
      - --no-sandbox
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
    ports:
      - "9222:9222"
    shm_size: "1gb"
